steps:
  - name: 'python:3.13-slim'
    id: Test
    entrypoint: bash
    args:
      - -c
      - |
        pip install -q -e ".[dev]" &&
        python -m pytest tests/ -q --tb=short -x
    env:
      - 'DATABASE_URL=sqlite+aiosqlite:///./test.db'
      - 'API_KEY=test-key'
      - 'ENVIRONMENT=test'
    volumes:
      - name: pip-cache
        path: /root/.cache/pip

  - name: 'gcr.io/kaniko-project/executor:v1.23.2'
    id: Build
    waitFor: ['Test']
    args:
      - '--dockerfile=Dockerfile'
      - '--context=.'
      - '--destination=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '--cache=true'
      - '--cache-ttl=24h'
      - '--cache-repo=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME-cache'
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:502.0.0-slim
    args:
      - run
      - services
      - update
      - $_SERVICE_NAME
      - '--platform=managed'
      - '--image=$_AR_HOSTNAME/$_AR_PROJECT_ID/$_AR_REPOSITORY/$REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA'
      - '--labels=managed-by=gcp-cloud-build-deploy-cloud-run,commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$BUILD_TRIGGER_ID'
      - '--region=$_DEPLOY_REGION'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=60'
      - '--min-instances=1'
      - '--max-instances=3'
      - '--no-cpu-throttling'
      - '--quiet'
    id: Deploy
    waitFor: ['Build']
    entrypoint: gcloud
options:
  substitutionOption: ALLOW_LOOSE
  logging: CLOUD_LOGGING_ONLY
# _AR_PROJECT_ID and _TRIGGER_ID must be set in the
# Cloud Build trigger via Console or Terraform — do not commit here
substitutions:
  _AR_REPOSITORY: cloud-run-source-deploy
  _PLATFORM: managed
  _SERVICE_NAME: mvp-backend
  _DEPLOY_REGION: europe-west1
  _AR_HOSTNAME: europe-west1-docker.pkg.dev
tags:
  - gcp-cloud-build-deploy-cloud-run
  - gcp-cloud-build-deploy-cloud-run-managed
  - mvp-backend